# Generated from:
# https://github.com/plone/meta/tree/2.x/src/plone/meta/default
# See the inline comments on how to expand/tweak this configuration file
[meta]
template = "default"
commit-id = "2.8.0"

[pyproject]
codespell_skip = "*.js,*.min.js,*.min.js.map,*.css.map,pnpm-lock.yaml,robot_*,test_*"

[github]
jobs = [
   "qa",
   "coverage",
   "release_ready",
]

[gitignore]
extra_lines = """
/test_*
/robot_*
/forest.*
"""

[tox]
use_mxdev = true
test_matrix = {"6.2" = ["*"]}
